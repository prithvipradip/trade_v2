# ============================================================
# AIT v2 - Autonomous Intelligent Trading Configuration
# ============================================================

trading:
  mode: paper                          # paper | live
  universe: [SPY, QQQ, IWM, DIA, AAPL, MSFT, NVDA, TSLA, AMD, AMZN, META, GOOGL, SOFI, PLTR]
  scan_interval_seconds: 300           # 5 minutes between scans
  max_daily_trades: 5
  trading_hours_only: true             # Only trade during RTH (9:30-16:00 ET)

account:
  pdt_protection: true                 # Enable Pattern Day Trader guard
  pdt_account_under_25k: true          # Set false if account >= $25k

positions:
  max_open_positions: 5
  max_position_pct: 0.05               # 5% of portfolio per position
  max_portfolio_delta: 0.30            # Net delta limit (absolute)
  max_portfolio_risk_pct: 0.02         # 2% max portfolio risk

risk:
  max_daily_loss_pct: 0.02             # 2% daily loss limit → circuit breaker
  max_consecutive_losses: 3            # Pause after 3 consecutive losses
  pause_minutes_after_losses: 30       # Cool-down period
  max_api_failures: 5                  # Halt after 5 API failures in 10 min
  min_confidence: 0.65                 # Minimum ML confidence to trade

options:
  delta_range: [0.20, 0.50]            # Target delta for long options
  dte_range: [14, 45]                  # Days to expiry range
  min_open_interest: 100               # Liquidity filter
  min_volume: 50                       # Daily volume filter
  max_bid_ask_spread_pct: 0.10         # 10% max spread
  strategies:
    - long_call
    - long_put
    - covered_call
    - cash_secured_put
    - bull_call_spread
    - bear_put_spread
    - iron_condor
    - long_straddle
    - short_strangle

ml:
  ensemble_weights:
    xgboost: 0.5
    lightgbm: 0.5
  retrain_interval_days: 7
  lookback_days: 504                   # 2 years of trading days
  min_training_samples: 100

meta_label:
  enabled: false                       # Disabled: trained on corrupted data, rejects everything. Re-enable after 50+ clean trades.
  min_probability: 0.50                # Min P(profitable) to take a trade (0.30-0.80)
  retrain_with_primary: true           # Retrain when primary model retrains

exit:
  trailing_stop_pct: 0.25             # Trail 25% below high water mark
  breakeven_trigger_pct: 0.30         # Move stop to breakeven at +30% P&L
  initial_stop_loss_pct: 0.50         # Fixed stop before breakeven activates
  partial_exit_levels:                 # Scale out at profit milestones
    - pnl_pct: 0.50                   # At +50%: close 33%
      close_pct: 0.33
    - pnl_pct: 1.00                   # At +100%: close another 33%
      close_pct: 0.33
  time_decay_scaling: true            # Lower take-profit target as DTE decreases
  volatility_adjusted_stops: true     # Widen stops for high-vol underlyings (ATR-based)
  auto_hedge: false                   # Auto-execute delta hedges (enable after paper testing)

learning:
  enabled: true                          # Self-learning: adapt strategies from past trades
  lookback_days: 30                      # Analyze last 30 days of trades
  max_adaptations_per_cycle: 3           # Max config changes per learning cycle
  min_insight_confidence: 0.60           # Only act on insights above 60% confidence
  min_confidence_floor: 0.50             # Never lower min_confidence below 50%
  min_confidence_ceiling: 0.90           # Never raise min_confidence above 90%

sentiment:
  enabled: true
  weight: 0.20                         # Sentiment contributes 20% to final signal
  cache_ttl_seconds: 300               # 5 min cache
  sources:
    news: true
    fear_greed: true
    finbert: true

notifications:
  telegram:
    enabled: true
    send_trades: true
    send_errors: true
    send_daily_summary: true
    send_circuit_breaker: true

dashboard:
  enabled: true
  port: 8501

logging:
  level: INFO
  file: logs/ait.log
  max_bytes: 10485760                  # 10 MB
  backup_count: 5
